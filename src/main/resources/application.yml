# ════════════════════════════════════════════════════════════════════════
# LLM Manager 기본 설정 (application.yml)
#
# 우선순위: CLI 인수 > settings.json (GUI 저장) > 이 파일
#
# CLI 오버라이드 방법
#   start.bat --api.server.port=9090 --api.server.enabled=true
#   gradlew run --args="--api.server.port=9090"
# ════════════════════════════════════════════════════════════════════════

# 내장 REST API 서버 (Javalin + Swagger UI)
api:
  server:
    # 앱 시작 시 자동 활성화 여부
    # CLI: --api.server.enabled=true
    enabled: false
    # HTTP 리슨 포트
    # CLI: --api.server.port=8185
    port: 8185
    # HTTP 바인딩 호스트. 기본값은 로컬 접근만 허용
    # CLI: --api.server.host=127.0.0.1
    host: 127.0.0.1
    # 서비스 시작/중지/재시작 API 토큰
    # CLI: --api.server.token=...
    token: "llm-manager-local-20260607"
    # true이면 서비스 제어 API를 토큰 없이 허용
    # CLI: --api.server.allow-unauthenticated-control=true
    allow-unauthenticated-control: true

# 런타임 명령어
runtime:
  # Python 실행 명령어 (Windows: python, Linux/Mac: python3)
  # CLI: --runtime.python=python3
  python: python
  # Python 설치 기본 경로 (비워 두면 PATH 기본값 사용)
  # CLI: --runtime.python-home=/usr/local
  python-home: ""
  # Node.js 실행 명령어
  # CLI: --runtime.node=node
  node: node
  # Node.js 설치 기본 경로 (비워 두면 PATH 기본값 사용)
  # CLI: --runtime.node-home=/usr/local
  node-home: ""
  # Java 실행 명령어
  # CLI: --runtime.java=java
  java: java
  # JAVA_HOME 경로 (비워 두면 JAVA_HOME 환경변수 사용)
  # CLI: --runtime.java-home=C:\Java\jdk21
  java-home: ""

# 서비스 기본 설치 경로
# 비워 두면 OS별 기본값: Windows=~/llm-services, Unix=~/.local/share/llm-services
# CLI: --install.base=D:\llm-services
install:
  base: ""

# LLM 스킬 라이브러리 DB
# provider: sqlite | postgresql | oracle | mssql
# SQLite는 url을 비워 두면 프로젝트 루트의 lib/cursor/skill-library.sqlite를 사용합니다.
# CLI:
#   --skill-library.db.provider=postgresql
#   --skill-library.db.url=jdbc:postgresql://localhost:5432/llm_manager
#   --skill-library.db.schema=llm_manager
#   --skill-library.db.username=llm
#   --skill-library.db.password=secret
skill-library:
  db:
    provider: sqlite
    url: ""
    driver-class: ""
    # PostgreSQL/Oracle/MSSQL에서 사용할 schema. SQLite는 비워 둡니다.
    schema: ""
    username: ""
    password: ""
    maximum-pool-size: 3
    minimum-idle: 0
    connection-timeout-ms: 3000
    idle-timeout-ms: 600000
    max-lifetime-ms: 1800000

# 모니터링 설정
monitor:
  # 서비스 헬스체크 및 메모리 수집 주기 (초, 1~10)
  # CLI: --monitor.health-check-interval=5
  health-check-interval: 10
