name: SQL Gen MCP Server
description: "자연어를 SQL로 변환하는 MCP 서버. LangChain4j + PostgreSQL + TEI 임베딩 기반."
runtimeType: JAVA
startCommand: "java -jar sql-gen-mcp-1.0.0-SNAPSHOT.jar"
installDir: "${user.home}/llm-services/sql-gen-mcp"
port: 7070
healthCheckPath: /actuator/health
installCommands: []
argSpecs:
  - name: server.port
    flag: "--server.port="
    type: INTEGER
    defaultValue: "8081"
    description: "[MCP 서버] HTTP 리슨 포트"
    enabled: false
  - name: mcp.port
    flag: "--mcp.port="
    type: INTEGER
    defaultValue: "7070"
    description: "[MCP 서버] MCP 프로토콜 포트 — Claude Code 등 MCP 클라이언트가 연결하는 포트"
    enabled: true
  - name: db.url
    flag: "--db.url="
    type: STRING
    defaultValue: "jdbc:postgresql://192.168.45.7:5433/dbmes"
    description: "[DB] PostgreSQL 연결 URL"
    enabled: true
  - name: db.user
    flag: "--db.user="
    type: STRING
    defaultValue: "tester1"
    description: "[DB] 접속 사용자명"
    enabled: true
  - name: db.pw
    flag: "--db.pw="
    type: STRING
    defaultValue: "tester1"
    description: "[DB] 접속 비밀번호"
    enabled: true
  - name: db.schema
    flag: "--db.schema="
    type: STRING
    defaultValue: "public"
    description: "[DB] 사용할 스키마 이름 (기본값: public)"
    enabled: false
  - name: db.driver
    flag: "--db.driver="
    type: STRING
    defaultValue: "org.postgresql.Driver"
    description: "[DB] JDBC 드라이버 클래스명"
    enabled: false
  - name: tei.base-url
    flag: "--ai.vector-store.providers.tei.base-url="
    type: STRING
    defaultValue: "http://localhost:18080/v1"
    description: "[임베딩] TEI 서버 URL — /v1까지 포함. BGE-M3 등 임베딩 모델 주소."
    enabled: true
  - name: tei.model-name
    flag: "--ai.vector-store.providers.tei.model-name="
    type: STRING
    defaultValue: "text-embeddings-inference"
    description: "[임베딩] TEI 모델명"
    enabled: false
  - name: tei.api-key
    flag: "--ai.vector-store.providers.tei.api-key="
    type: STRING
    defaultValue: "-"
    description: "[임베딩] TEI API 키. 인증이 없으면 더미값 '-' 사용."
    enabled: false
  - name: embedding.provider
    flag: "--ai.vector-store.embedding.provider="
    type: SELECT
    defaultValue: "tei"
    description: "[임베딩] 모델 종류 — tei: Text Embeddings Inference (기본), local: ONNX 내장"
    options: [tei, local, ollama, openai, vllm]
    enabled: false
  - name: embedding.batch-size
    flag: "--ai.vector-store.embedding.batch-size="
    type: INTEGER
    defaultValue: "32"
    description: "[임베딩] 한 요청에 보낼 최대 segment 수. TEI max-client-batch-size와 맞춰야 함."
    enabled: false
  - name: ollama.base-url
    flag: "--ai.vector-store.providers.ollama.base-url="
    type: STRING
    defaultValue: "http://localhost:11434"
    description: "[임베딩] Ollama 서버 URL"
    enabled: false
  - name: ollama.model-name
    flag: "--ai.vector-store.providers.ollama.model-name="
    type: STRING
    defaultValue: "nomic-embed-text"
    description: "[임베딩] Ollama 모델명"
    enabled: false
  - name: openai.base-url
    flag: "--ai.vector-store.providers.openai.base-url="
    type: STRING
    defaultValue: "https://api.openai.com/v1"
    description: "[임베딩] OpenAI 호환 임베딩 API Base URL"
    enabled: false
  - name: openai.model-name
    flag: "--ai.vector-store.providers.openai.model-name="
    type: STRING
    defaultValue: "text-embedding-3-small"
    description: "[임베딩] OpenAI 임베딩 모델명"
    enabled: false
  - name: openai.api-key
    flag: "--ai.vector-store.providers.openai.api-key="
    type: STRING
    defaultValue: ""
    description: "[임베딩] OpenAI API 키"
    enabled: false
  - name: vllm.base-url
    flag: "--ai.vector-store.providers.vllm.base-url="
    type: STRING
    defaultValue: "http://localhost:8000/v1"
    description: "[임베딩] vLLM OpenAI 호환 API Base URL"
    enabled: false
  - name: vllm.model-name
    flag: "--ai.vector-store.providers.vllm.model-name="
    type: STRING
    defaultValue: "your-vllm-model"
    description: "[임베딩] vLLM 임베딩 모델명"
    enabled: false
  - name: vllm.api-key
    flag: "--ai.vector-store.providers.vllm.api-key="
    type: STRING
    defaultValue: "optional"
    description: "[임베딩] vLLM API 키"
    enabled: false
  - name: vector-store.provider
    flag: "--ai.vector-store.provider="
    type: SELECT
    defaultValue: "local"
    description: "[벡터 DB] 저장소 종류 — local: 인메모리(재시작 시 재인덱싱), chroma: ChromaDB 영속"
    options: [local, chroma]
    enabled: false
  - name: chroma.url
    flag: "--ai.vector-store.chroma.url="
    type: STRING
    defaultValue: "http://localhost:18000"
    description: "[벡터 DB] ChromaDB HTTP URL"
    enabled: false
  - name: chroma.collection-name
    flag: "--ai.vector-store.chroma.collection-name="
    type: STRING
    defaultValue: "sql-mcp-tools"
    description: "[벡터 DB] ChromaDB 기본 컬렉션명"
    enabled: false
  - name: chroma.table-collection-name
    flag: "--ai.vector-store.chroma.table-collection-name="
    type: STRING
    defaultValue: "sql-mcp-tools"
    description: "[벡터 DB] 테이블 스키마 검색용 ChromaDB 컬렉션명"
    enabled: false
  - name: chroma.example-collection-name
    flag: "--ai.vector-store.chroma.example-collection-name="
    type: STRING
    defaultValue: "sql-mcp-examples"
    description: "[벡터 DB] SQL 예시 검색용 ChromaDB 컬렉션명"
    enabled: false
  - name: chroma.tenant
    flag: "--ai.vector-store.chroma.tenant="
    type: STRING
    defaultValue: "sql_mcp_server"
    description: "[벡터 DB] ChromaDB 테넌트명"
    enabled: false
  - name: chroma.database
    flag: "--ai.vector-store.chroma.database="
    type: STRING
    defaultValue: "sql_mcp_server"
    description: "[벡터 DB] ChromaDB 데이터베이스명"
    enabled: false
groovyScript: |
  // installDir: JAR 파일이 있는 디렉토리 경로를 입력하세요.
  // 예) C:\\Users\\KYJ\\projects\\sql-gen-mcp\\bin
  service.workingDir = service.installDir
  service.startCommand = 'java -jar sql-gen-mcp-1.0.0-SNAPSHOT.jar'
