name: Swagger MCP Server
description: "OpenAPI(Swagger) 문서를 읽어 MCP 도구로 변환하는 서버. Claude Code 등 MCP 클라이언트에서 REST API를 직접 호출할 수 있게 해준다."
runtimeType: JAVA
startCommand: "java -jar swagger-mcp-server.jar"
installDir: "${user.home}/llm-services/swagger-mcp"
port: 17070
healthCheckPath: /actuator/health
installCommands: []
argSpecs:
  - name: server.port
    flag: "--server.port="
    type: INTEGER
    defaultValue: "17070"
    description: "MCP 서버 HTTP 포트"
    enabled: true
  - name: api-base-url
    flag: "--infobip.openapi.mcp.api-base-url="
    type: STRING
    defaultValue: "http://localhost:20301"
    description: "실제 API 요청이 전달될 백엔드 서버 URL (필수)"
    enabled: true
  - name: open-api-url
    flag: "--infobip.openapi.mcp.open-api-url="
    type: STRING
    defaultValue: "http://localhost:20301/v3/api-docs"
    description: "OpenAPI 문서 URL 또는 파일 경로 (필수). Swagger 2.x는 /v2/api-docs"
    enabled: true
  - name: auth.header-name
    flag: "--swagger.auth.header-name="
    type: STRING
    defaultValue: ""
    description: "인증 헤더 이름 (예: Authorization). 비워 두면 인증 비활성화."
    enabled: false
  - name: auth.header-value
    flag: "--swagger.auth.header-value="
    type: STRING
    defaultValue: ""
    description: "인증 헤더 값 (예: Bearer eyJhbGc...)"
    enabled: false
  - name: embedding.provider
    flag: "--embedding.provider="
    type: SELECT
    defaultValue: "tei"
    description: "임베딩 모델 종류"
    options: [tei, local, ollama]
    enabled: false
  - name: embedding.ollama.base-url
    flag: "--embedding.ollama.base-url="
    type: STRING
    defaultValue: "http://localhost:11434"
    description: "Ollama 임베딩 서버 URL"
    enabled: false
  - name: embedding.ollama.model
    flag: "--embedding.ollama.model="
    type: STRING
    defaultValue: "nomic-embed-text"
    description: "Ollama 임베딩 모델명. nomic-embed-text는 보통 768차원."
    enabled: false
  - name: embedding.tei.base-url
    flag: "--embedding.tei.base-url="
    type: STRING
    defaultValue: "http://localhost:18080/v1"
    description: "TEI 임베딩 서버 URL. /v1까지 포함해야 하며 /embeddings는 클라이언트가 붙인다."
    enabled: false
  - name: embedding.tei.model
    flag: "--embedding.tei.model="
    type: STRING
    defaultValue: "text-embeddings-inference"
    description: "TEI 요청에 사용할 모델명"
    enabled: false
  - name: embedding.tei.api-key
    flag: "--embedding.tei.api-key="
    type: STRING
    defaultValue: "-"
    description: "TEI API 키. 인증이 없으면 더미값 '-' 사용."
    enabled: false
  - name: vector-store.provider
    flag: "--vector-store.provider="
    type: SELECT
    defaultValue: "memory"
    description: "벡터 저장소 종류. memory=재시작 시 재인덱싱, chroma/pgvector=영속."
    options: [memory, chroma, pgvector]
    enabled: false
  - name: vector-store.memory.store-file
    flag: "--vector-store.memory.store-file="
    type: STRING
    defaultValue: "embedding-store.json"
    description: "memory 벡터 스토어 스냅샷 파일 경로. 재시작 시 재임베딩 생략에 사용."
    enabled: false
  - name: vector-store.chroma.url
    flag: "--vector-store.chroma.url="
    type: STRING
    defaultValue: "http://localhost:18000"
    description: "ChromaDB HTTP URL. Docker 컨테이너 내부에서는 http://host.docker.internal:18000 사용."
    enabled: false
  - name: vector-store.chroma.collection-name
    flag: "--vector-store.chroma.collection-name="
    type: STRING
    defaultValue: "mcp-tools"
    description: "ChromaDB 컬렉션명"
    enabled: false
  - name: vector-store.chroma.tenant
    flag: "--vector-store.chroma.tenant="
    type: STRING
    defaultValue: "swagger_mcp_server"
    description: "ChromaDB 테넌트명"
    enabled: false
  - name: vector-store.chroma.database
    flag: "--vector-store.chroma.database="
    type: STRING
    defaultValue: "swagger_mcp_server"
    description: "ChromaDB 데이터베이스명"
    enabled: false
  - name: vector-store.pgvector.url
    flag: "--vector-store.pgvector.url="
    type: STRING
    defaultValue: "jdbc:postgresql://localhost:5432/mcp_db"
    description: "PostgreSQL pgvector JDBC URL"
    enabled: false
  - name: vector-store.pgvector.username
    flag: "--vector-store.pgvector.username="
    type: STRING
    defaultValue: "postgres"
    description: "PostgreSQL pgvector 사용자명"
    enabled: false
  - name: vector-store.pgvector.password
    flag: "--vector-store.pgvector.password="
    type: STRING
    defaultValue: ""
    description: "PostgreSQL pgvector 비밀번호"
    enabled: false
  - name: vector-store.pgvector.table-name
    flag: "--vector-store.pgvector.table-name="
    type: STRING
    defaultValue: "tool_embeddings"
    description: "pgvector 테이블명"
    enabled: false
  - name: vector-store.pgvector.dimension
    flag: "--vector-store.pgvector.dimension="
    type: INTEGER
    defaultValue: "384"
    description: "임베딩 차원 수. local=384, nomic-embed-text=768, bge-m3/Qwen3/e5-large=1024."
    enabled: false
  - name: reindex-on-startup
    flag: "--indexing.reindex-on-startup="
    type: SELECT
    defaultValue: "true"
    description: "시작 시 API 툴 재인덱싱 여부. chroma/pgvector 사용 시 false 권장."
    options: ["true", "false"]
    enabled: false
  - name: codebase-memory.enabled
    flag: "--codebase-memory.enabled="
    type: SELECT
    defaultValue: "false"
    description: "Codebase Memory MCP 연동 활성화 (codebase-memory-mcp.exe 별도 기동 필요)"
    options: ["false", "true"]
    enabled: false
  - name: codebase-memory.base-url
    flag: "--codebase-memory.base-url="
    type: STRING
    defaultValue: "http://localhost:9748"
    description: "Codebase Memory MCP HTTP URL"
    enabled: false
  - name: codebase-memory.tool-prefix
    flag: "--codebase-memory.tool-prefix="
    type: STRING
    defaultValue: "cbm_"
    description: "Codebase Memory 프록시 도구 이름 접두사"
    enabled: false
  - name: codebase-memory.connect-timeout-ms
    flag: "--codebase-memory.connect-timeout-ms="
    type: INTEGER
    defaultValue: "3000"
    description: "Codebase Memory 연결 타임아웃(ms)"
    enabled: false
  - name: codebase-memory.read-timeout-ms
    flag: "--codebase-memory.read-timeout-ms="
    type: INTEGER
    defaultValue: "30000"
    description: "Codebase Memory 읽기 타임아웃(ms)"
    enabled: false
