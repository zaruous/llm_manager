name: BGE-M3 Embedding Server
description: "BAAI/bge-m3 embedding model server (FastAPI)"
runtimeType: PYTHON
repoUrl: "https://github.com/zaruous/bgem3-pyserver"
startCommand: "python server.py"
port: 3000
healthCheckPath: /health
installCommands:
  - "pip install fastapi \"uvicorn[standard]\" FlagEmbedding torch pydantic numpy"
argSpecs:
  - name: port
    flag: "--port"
    type: INTEGER
    defaultValue: "3000"
    description: "서버 포트"
  - name: device
    flag: "--device"
    type: SELECT
    defaultValue: "auto"
    options: [auto, cpu, cuda, mps]
    description: "연산 장치"
  - name: fp16
    flag: "--fp16"
    type: BOOLEAN
    defaultValue: "false"
    description: "FP16 모드 (CUDA 권장)"
  - name: batch-size
    flag: "--batch-size"
    type: INTEGER
    defaultValue: "32"
    description: "배치 크기"
  - name: model
    flag: "--model"
    type: STRING
    defaultValue: "BAAI/bge-m3"
    description: "모델 이름"
groovyScript: |
  // 환경변수 INSTALL_BASE가 있으면 우선 사용, 없으면 홈 디렉토리 기본값
  service.installDir = env('INSTALL_BASE') ?: (userHome + '/llm-services/bgem3-pyserver')
  service.workingDir = service.installDir

  // OS별 python 명령어 분기
  if (os == 'windows') {
      service.startCommand = 'python server.py'
  } else {
      service.startCommand = 'python3 server.py'
  }

  // CUDA 환경이면 fp16 기본값을 true로
  if (env('CUDA_VISIBLE_DEVICES') != null) {
      def fp16Spec = service.argSpecs.find { it.name == 'fp16' }
      if (fp16Spec) fp16Spec.defaultValue = 'true'
  }
