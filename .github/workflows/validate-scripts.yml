# 설치 스크립트(PS 5.1) 검증 — 실제 대상 런타임인 Windows PowerShell 5.1에서
# 구문·헬퍼 함수·실행 경로를 스모크 테스트한다.
#
# 러너 환경 특성으로 검증 가능한 경로:
#   - install-python.ps1        : 러너에 Python 프리인스톨 → '이미 설치됨' 경로 (exit 0)
#   - install-nvidia-driver.ps1 : 러너에 NVIDIA GPU 없음 → GPU 감지 실패 경로 (exit 1)
#   - install-nodejs.ps1        : setup-node로 Node 22 준비 → '이미 설치됨' 경로 (exit 0)
name: Validate Install Scripts

on:
  workflow_dispatch:
  push:
    paths:
      - 'bin/*.ps1'
      - '.github/workflows/validate-scripts.yml'

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Syntax check (Windows PowerShell 5.1)
        shell: powershell
        run: |
          $failed = $false
          foreach ($f in @("bin/install-python.ps1", "bin/install-nvidia-driver.ps1", "bin/install-nodejs.ps1")) {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $f), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Host "FAIL: $f"
              $errors | ForEach-Object { Write-Host "  line $($_.Extent.StartLineNumber): $($_.Message)" }
              $failed = $true
            } else {
              Write-Host "OK: $f (syntax valid on PS $($PSVersionTable.PSVersion))"
            }
          }
          if ($failed) { exit 1 }

      - name: Helper function unit tests (PS 5.1)
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          # AST에서 함수 정의만 추출해 로드 (스크립트 본문 실행 없이 함수만 테스트)
          $tokens = $null; $errors = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path "bin/install-nvidia-driver.ps1"), [ref]$tokens, [ref]$errors)
          $funcs = $ast.FindAll({param($n) $n -is [System.Management.Automation.Language.FunctionDefinitionAst]}, $true)
          foreach ($name in @("Get-EnvProxy", "Find-OfflineInstaller")) {
            $f = $funcs | Where-Object { $_.Name -eq $name }
            Invoke-Expression $f.Extent.Text
          }

          $fail = $false
          function Assert([bool]$cond, [string]$msg) {
            if ($cond) { Write-Host "OK: $msg" } else { Write-Host "FAIL: $msg"; Set-Variable -Name fail -Value $true -Scope 1 }
          }

          $env:HTTPS_PROXY = $null; $env:HTTP_PROXY = $null
          Assert ($null -eq (Get-EnvProxy)) "Get-EnvProxy returns null without env vars"
          $env:HTTP_PROXY = "http://proxy.corp:8080"
          Assert ((Get-EnvProxy) -eq "http://proxy.corp:8080") "Get-EnvProxy reads HTTP_PROXY"
          $env:HTTPS_PROXY = "http://sproxy.corp:8080"
          Assert ((Get-EnvProxy) -eq "http://sproxy.corp:8080") "HTTPS_PROXY takes precedence"
          $env:HTTPS_PROXY = $null; $env:HTTP_PROXY = $null

          $OFFLINE_DIR = Join-Path $env:TEMP "llm-offline-test"
          New-Item -ItemType Directory -Path $OFFLINE_DIR -Force | Out-Null
          "x" | Set-Content (Join-Path $OFFLINE_DIR "nvidia-driver-551.61.exe")
          Start-Sleep -Milliseconds 1100
          "x" | Set-Content (Join-Path $OFFLINE_DIR "nvidia-driver-560.81.exe")
          "x" | Set-Content (Join-Path $OFFLINE_DIR "cuda_12.4.0_551.61_windows.exe")

          Assert ((Find-OfflineInstaller "nvidia-driver*.exe") -like "*560.81*") "newest driver file selected"
          Assert ($null -ne (Find-OfflineInstaller "cuda_12.4*.exe")) "CUDA pattern matched"
          Assert ($null -eq (Find-OfflineInstaller "cuda_12.1*.exe")) "non-matching version returns null"
          Remove-Item $OFFLINE_DIR -Recurse -Force

          $OFFLINE_DIR = Join-Path $env:TEMP "no-such-dir-xyz"
          Assert ($null -eq (Find-OfflineInstaller "*.exe")) "missing offline dir returns null"

          if ($fail) { exit 1 }

      # Java(SetupCheckDialog)가 호출하는 방식 그대로 자식 powershell.exe로 실행
      - name: Run install-python.ps1 (already-installed path, expect exit 0)
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File bin\install-python.ps1
          if ($LASTEXITCODE -ne 0) { Write-Error "expected exit 0, got $LASTEXITCODE"; exit 1 }
          Write-Host "OK: already-installed path exited 0"

      - name: Setup Node.js 22 (for install-nodejs.ps1 already-installed path)
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run install-nodejs.ps1 (already-installed path, expect exit 0)
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File bin\install-nodejs.ps1
          if ($LASTEXITCODE -ne 0) { Write-Error "expected exit 0, got $LASTEXITCODE"; exit 1 }
          Write-Host "OK: already-installed path exited 0"

      - name: Run install-nvidia-driver.ps1 (no-GPU path, expect exit 1)
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File bin\install-nvidia-driver.ps1 -NonInteractive -SkipCuda
          # GitHub Actions가 스텝 끝에 exit $LASTEXITCODE를 덧붙이므로 성공 시 exit 0 명시
          if ($LASTEXITCODE -eq 1) { Write-Host "OK: no-GPU path exited 1 as expected"; exit 0 }
          Write-Error "expected exit 1, got $LASTEXITCODE"; exit 1
