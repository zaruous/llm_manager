# Windows EXE 인스톨러 빌드 (jpackage + WiX)
#
# 트리거:
#   - workflow_dispatch : Actions 탭에서 수동 실행
#   - v* 태그 푸시      : 릴리스 빌드
#   - 검증 브랜치 푸시   : 워크플로 동작 확인용 (검증 완료 후 제거 가능)
#
# 참고: lib/*.jar 번들 파일(sql-gen/swagger 서버 JAR 등)은 gitignore라
# CI 산출물에는 포함되지 않는다. 인스톨러 생성 자체의 검증이 목적.
name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags: ['v*']
    branches: ['claude/java-setup-script-review-3x20o9']

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # jpackage --type exe 는 WiX 3.x 필요.
      # deploy/WiX 에 받아두면 build.gradle 의 configureBundledWixPath() 가 PATH 에 잡는다.
      - name: Download WiX Toolset
        run: powershell -ExecutionPolicy Bypass -File bin/Download-WiX.ps1

      - name: Build EXE installer
        run: ./gradlew.bat jpackageExe --no-daemon

      - name: Verify installer output
        run: |
          $exe = Get-ChildItem build/installer -Filter 'LLMManager-*.exe'
          if (-not $exe) { Write-Error "EXE not found in build/installer"; exit 1 }
          $exe | ForEach-Object { Write-Host "OK: $($_.Name) ($([math]::Round($_.Length / 1MB, 1)) MB)" }

      - uses: actions/upload-artifact@v4
        with:
          name: LLMManager-installer
          path: build/installer/LLMManager-*.exe
          if-no-files-found: error
