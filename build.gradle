plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

group = 'org.kyj'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

javafx {
    version = '21.0.2'
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.web']
}

dependencies {
    implementation 'io.github.mkpaz:atlantafx-base:2.0.1'
    implementation 'org.controlsfx:controlsfx:11.2.1'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.16.1'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.16.1'
    implementation 'org.slf4j:slf4j-api:2.0.12'
    implementation 'ch.qos.logback:logback-classic:1.5.3'
    implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.16.1'
    implementation 'com.zaxxer:HikariCP:5.1.0'
    implementation 'org.xerial:sqlite-jdbc:3.45.2.0'
    implementation 'org.postgresql:postgresql:42.7.10'
    implementation 'com.microsoft.sqlserver:mssql-jdbc:13.4.0.jre11'
    implementation 'com.oracle.database.jdbc:ojdbc11:23.26.2.0.0'
    implementation 'org.apache.commons:commons-exec:1.6.0'
    implementation 'org.apache.groovy:groovy:4.0.21'
    implementation 'org.apache.groovy:groovy-jsr223:4.0.21'
    // 내장 REST API 서버 + Swagger UI
    implementation 'io.javalin:javalin:6.3.0'
    // 시스템 리소스 모니터링 (CPU·메모리·OS 정보)
    implementation 'com.github.oshi:oshi-core:6.6.1'

    testImplementation 'org.junit.jupiter:junit-jupiter:6.0.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

application {
    mainClass = 'org.kyj.llmmanager.LlmManagerApp'
}

// 배포판 시작 스크립트: JavaFX JAR 만 --module-path 에 분리
startScripts {
    doLast {
        def javafxJarNames = configurations.runtimeClasspath.files
            .findAll { it.name.startsWith('javafx-') }
            .collect { it.name }

        // Windows .bat
        def bat = windowsScript.text
        def mpWin = javafxJarNames.collect { '%APP_HOME%\\lib\\' + it }.join(';')
        bat = bat.replace(
            'set DEFAULT_JVM_OPTS=',
            "set DEFAULT_JVM_OPTS=--module-path \"${mpWin}\" --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.base"
        )
        windowsScript.text = bat

        // Unix shell
        def sh = unixScript.text
        def mpUnix = javafxJarNames.collect { '$APP_HOME/lib/' + it }.join(':')
        sh = sh.replace(
            'DEFAULT_JVM_OPTS=""',
            "DEFAULT_JVM_OPTS=\"--module-path \\\"${mpUnix}\\\" --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.base\""
        )
        unixScript.text = sh
    }
}

// ──────────────────────────────────────────────────────────────
// 개발 모드: DCEVM + HotswapAgent + FXML 파일 감시
// 사용법: ./gradlew runDev
//   (최초 1회) ./gradlew downloadHotswapAgent  →  lib/hotswap/hotswap-agent.jar 다운로드
// ──────────────────────────────────────────────────────────────

tasks.register('downloadHotswapAgent') {
    group = 'development'
    description = 'HotswapAgent JAR을 lib/hotswap/ 에 다운로드합니다'
    def agentFile = file('lib/hotswap/hotswap-agent.jar')
    outputs.file agentFile
    doLast {
        if (agentFile.exists()) {
            println "이미 존재합니다: ${agentFile}"
            return
        }
        agentFile.parentFile.mkdirs()
        def url = 'https://github.com/HotswapProjects/HotswapAgent/releases/download/2.0.1/hotswap-agent-2.0.1-all.jar'
        println "다운로드 중: ${url}"
        new URL(url).withInputStream { is -> agentFile.bytes = is.bytes }
        println "완료: ${agentFile}"
    }
}

// run 태스크에 개발 모드 JVM 옵션 추가 (./gradlew run -Pdev 또는 ./gradlew runDev)
run {
    if (project.hasProperty('dev') || project.hasProperty('runDev')) {
        def hotswapJar = file('lib/hotswap/hotswap-agent.jar')
        systemProperty 'llm.dev', 'true'
        // 표준 JDK에서 JBR 전용 옵션을 무시하도록 먼저 선언
        jvmArgs '-XX:+IgnoreUnrecognizedVMOptions'
        // DCEVM / JetBrains Runtime 전용: 전체 클래스 재정의 활성화
        jvmArgs '-XX:+AllowEnhancedClassRedefinition',
                '-XX:HotswapAgent=fatjar'
        if (hotswapJar.exists()) {
            jvmArgs "-javaagent:${hotswapJar.absolutePath}"
            println "[DEV] HotswapAgent 활성화: ${hotswapJar}"
        } else {
            println "[DEV] hotswap-agent.jar 없음 → ./gradlew downloadHotswapAgent 실행 후 재시도"
        }
    }
}

tasks.register('runDev') {
    group = 'application'
    description = '개발 모드로 실행 (DCEVM + HotswapAgent + FXML 핫 리로드)'
    doFirst { project.ext.runDev = true }
    finalizedBy 'run'
}

// 배포판에 기본 제공 서비스 정의 파일 포함
distributions {
    main {
        contents {
            from('lib/def') {
                into('lib/def')
            }
        }
    }
}

// ──────────────────────────────────────────────────────────────
// 설치 패키지 (jpackage — JDK 17+ 내장)
//
// ./gradlew jpackageImage   → build/installer/  앱 이미지 폴더 (WiX 불필요, zip 배포 가능)
// ./gradlew jpackageExe     → build/installer/  EXE/DMG/DEB 인스톨러
//
// ※ Windows EXE/MSI 생성 시 WiX Toolset 3.0+ 이 필요합니다.
//    https://github.com/wixtoolset/wix3/releases/tag/wix3141rtm
//
// 패키징 아이콘은 generatePackageIcons 태스크가 build/package-icons/ 아래에 자동 생성한다.
// ──────────────────────────────────────────────────────────────

tasks.register('generatePackageIcons') {
    group = 'distribution'
    description = 'jpackage용 앱 아이콘(ICO/ICNS/PNG)을 생성합니다'
    def iconDir = layout.buildDirectory.dir('package-icons')
    outputs.dir iconDir
    doLast {
        def out = iconDir.get().asFile
        out.mkdirs()
        def images = [16, 32, 48, 64, 128, 256, 512, 1024].collectEntries { size ->
            [(size): createPackageIconImage(size)]
        }
        javax.imageio.ImageIO.write(images[256], 'png', new File(out, 'LLMManager.png'))
        writeIco(new File(out, 'LLMManager.ico'), [16, 32, 48, 256].collect { images[it] })
        writeIcns(new File(out, 'LLMManager.icns'), [
            [type: 'ic07', image: images[128]],
            [type: 'ic08', image: images[256]],
            [type: 'ic09', image: images[512]],
            [type: 'ic10', image: images[1024]],
        ])
    }
}

// 1단계: installDist 결과물(JARs + lib/def/)을 jpackage 입력 디렉토리로 복사
tasks.register('prepareJpackageInput', Copy) {
    group       = 'distribution'
    description = 'jpackage 입력 디렉토리를 준비합니다 (JARs + def/)'
    dependsOn installDist
    // build/install/<name>/lib/ 에는 이미 JARs 와 def/ 서브폴더가 있다
    from layout.buildDirectory.dir("install/${project.name}/lib")
    into layout.buildDirectory.dir('jpackage-input')
}

// 2-A: app-image (폴더 구조) — WiX 없이 빌드 가능, zip 으로 배포
tasks.register('jpackageImage', Exec) {
    group       = 'distribution'
    description = '앱 이미지(폴더)를 생성합니다 — WiX 없이 zip 배포 가능'
    dependsOn 'prepareJpackageInput', 'generatePackageIcons'
    doFirst { commandLine buildJpackageArgs('app-image', project) }
}

// 2-B: 네이티브 인스톨러 (Windows MSI, macOS DMG, Linux DEB)
// 2-B: 네이티브 인스톨러 (Windows EXE, macOS DMG, Linux DEB)
tasks.register('jpackageExe', Exec) {
    group       = 'distribution'
    description = 'EXE/DMG/DEB 인스톨러를 생성합니다 (Windows: WiX 3.0+ 필요)'
    dependsOn 'prepareJpackageInput', 'generatePackageIcons'
    doFirst {
        def os   = org.gradle.internal.os.OperatingSystem.current()
        def type = os.windows ? 'exe' : (os.macOsX ? 'dmg' : 'deb')
        if (os.windows) {
            configureBundledWixPath(delegate, project)
        }
        commandLine buildJpackageArgs(type, project)
    }
}

/**
 * jpackage 커맨드 인수 목록을 조립해 반환한다.
 * BuiltinServiceLoader 가 JAR 위치 기준 def/ 를 탐색하므로,
 * installDist 의 lib/ 구조(JAR 와 def/ 가 같은 레벨)를 그대로 사용한다.
 *
 * @param type  jpackage --type 값 (app-image / exe / msi / dmg / deb)
 * @param proj  현재 Gradle Project 객체
 * @return      jpackage 실행 인수 리스트
 */
List<String> buildJpackageArgs(String type, Project proj) {
    def outDir   = proj.layout.buildDirectory.dir('installer').get().asFile
    def inputDir = proj.layout.buildDirectory.dir('jpackage-input').get().asFile
    outDir.mkdirs()

    def mainJar    = "${proj.name}-${proj.version}.jar"
    // JavaFX 모듈 목록 — 런타임에 $APPDIR(앱 설치 경로) 에서 로드
    def javafxMods = 'javafx.controls,javafx.fxml,javafx.web,javafx.graphics,javafx.base'

    def cmd = [
        'jpackage',
        '--type',        type,
        '--input',       inputDir.absolutePath,
        '--dest',        outDir.absolutePath,
        // WiX light.exe 는 앱 이름에 공백이 있으면 MSI 링크 단계(exit 311)에서 실패한다.
        // --name 은 공백 없이 지정하고 표시 이름은 --description 으로 분리한다.
        '--name',        'LLMManager',
        '--app-version', proj.version as String,
        '--main-jar',    mainJar,
        '--main-class',  'org.kyj.llmmanager.LlmManagerApp',
        // $APPDIR: jpackage 런타임 매크로 → 설치된 app/ 디렉토리로 치환됨
        '--java-options', '--module-path $APPDIR',
        '--java-options', "--add-modules ${javafxMods}",
        '--java-options', '-Xmx512m',
        '--java-options', '--add-opens java.base/java.lang=ALL-UNNAMED',
    ]

    def iconFile = resolvePackageIconFile(proj)
    if (iconFile != null && iconFile.exists()) {
        cmd += ['--icon', iconFile.absolutePath]
    }

    // app-image 는 인스톨러 전용 옵션을 지원하지 않으므로 제외
    if (type != 'app-image') {
        def os = org.gradle.internal.os.OperatingSystem.current()
        if (os.windows) {
            cmd += [
                '--win-dir-chooser',
                '--win-menu',
                '--win-shortcut',
                '--win-menu-group', 'LLM Manager',
                '--vendor',         'KYJ',
                '--description',    'LLM Service Manager',
            ]
        } else if (os.macOsX) {
            cmd += ['--mac-package-name', 'LLMManager']
        } else {
            cmd += [
                '--linux-shortcut',
                '--linux-menu-group', 'LLM Manager',
                '--vendor',           'KYJ',
            ]
        }
    }
    return cmd
}

File resolvePackageIconFile(Project proj) {
    def os = org.gradle.internal.os.OperatingSystem.current()
    def iconDir = proj.layout.buildDirectory.dir('package-icons').get().asFile
    if (os.windows) return new File(iconDir, 'LLMManager.ico')
    if (os.macOsX)  return new File(iconDir, 'LLMManager.icns')
    return new File(iconDir, 'LLMManager.png')
}

void configureBundledWixPath(Exec task, Project proj) {
    def wixDir = proj.file('deploy/WiX')
    if (!new File(wixDir, 'light.exe').exists() || !new File(wixDir, 'candle.exe').exists()) {
        logger.lifecycle("[jpackage] bundled WiX not found under ${wixDir}; using current PATH")
        return
    }
    def currentPath = System.getenv('PATH') ?: ''
    task.environment 'PATH', wixDir.absolutePath + File.pathSeparator + currentPath
    logger.lifecycle("[jpackage] using bundled WiX: ${wixDir}")
}

java.awt.image.BufferedImage createPackageIconImage(int size) {
    def img = new java.awt.image.BufferedImage(size, size, java.awt.image.BufferedImage.TYPE_INT_ARGB)
    def g = img.createGraphics()
    g.setRenderingHint(java.awt.RenderingHints.KEY_ANTIALIASING, java.awt.RenderingHints.VALUE_ANTIALIAS_ON)
    g.setRenderingHint(java.awt.RenderingHints.KEY_TEXT_ANTIALIASING, java.awt.RenderingHints.VALUE_TEXT_ANTIALIAS_ON)
    g.setRenderingHint(java.awt.RenderingHints.KEY_RENDERING, java.awt.RenderingHints.VALUE_RENDER_QUALITY)

    def bg = new java.awt.Color(0x1a, 0x1a, 0x2e)
    def accent = new java.awt.Color(0x33, 0x99, 0xff)
    def accent2 = new java.awt.Color(0x55, 0xbb, 0xff)
    float pad = size * 0.04f
    float radius = size * 0.22f
    float border = Math.max(1.5f, size * 0.07f) as float

    g.setColor(bg)
    g.fill(new java.awt.geom.RoundRectangle2D.Float((float)pad, (float)pad,
            (float)(size - 2 * pad), (float)(size - 2 * pad), (float)(radius * 2), (float)(radius * 2)))
    g.setColor(accent)
    g.setStroke(new java.awt.BasicStroke(border, java.awt.BasicStroke.CAP_ROUND, java.awt.BasicStroke.JOIN_ROUND))
    g.draw(new java.awt.geom.RoundRectangle2D.Float((float)(pad + border / 2), (float)(pad + border / 2),
            (float)(size - 2 * pad - border), (float)(size - 2 * pad - border),
            (float)(radius * 2), (float)(radius * 2)))

    int fontSize = Math.max(8, (int)(size * 0.36))
    g.setFont(new java.awt.Font('Arial', java.awt.Font.BOLD, fontSize))
    def fm = g.getFontMetrics()
    def text = 'LM'
    int tx = (size - fm.stringWidth(text)) / 2
    int ty = (size - fm.getHeight()) / 2 + fm.getAscent()
    if (size >= 32) {
        g.setColor(accent.darker())
        g.drawString(text, tx + 1, ty + 1)
    }
    g.setColor(java.awt.Color.WHITE)
    g.drawString(text, tx, ty)

    if (size >= 32) {
        float lineW = size * 0.5f
        float lineH = Math.max(2, size * 0.05f) as float
        float lineX = (size - lineW) / 2f
        float lineY = size - pad - border - lineH * 2
        g.setColor(accent2)
        g.fillRoundRect((int)lineX, (int)lineY, (int)lineW, (int)lineH, (int)lineH, (int)lineH)
    }
    g.dispose()
    return img
}

byte[] pngBytes(java.awt.image.BufferedImage image) {
    def baos = new ByteArrayOutputStream()
    javax.imageio.ImageIO.write(image, 'png', baos)
    return baos.toByteArray()
}

void writeIntLE(OutputStream out, int value) {
    out.write(value & 0xff)
    out.write((value >> 8) & 0xff)
    out.write((value >> 16) & 0xff)
    out.write((value >> 24) & 0xff)
}

void writeShortLE(OutputStream out, int value) {
    out.write(value & 0xff)
    out.write((value >> 8) & 0xff)
}

void writeIco(File file, List<java.awt.image.BufferedImage> images) {
    def entries = images.collect { [image: it, data: pngBytes(it)] }
    file.withOutputStream { out ->
        writeShortLE(out, 0)
        writeShortLE(out, 1)
        writeShortLE(out, entries.size())
        int offset = 6 + entries.size() * 16
        entries.each { entry ->
            int size = entry.image.width
            out.write(size >= 256 ? 0 : size)
            out.write(size >= 256 ? 0 : size)
            out.write(0)
            out.write(0)
            writeShortLE(out, 1)
            writeShortLE(out, 32)
            writeIntLE(out, entry.data.length)
            writeIntLE(out, offset)
            offset += entry.data.length
        }
        entries.each { out.write(it.data) }
    }
}

void writeIntBE(OutputStream out, int value) {
    out.write((value >> 24) & 0xff)
    out.write((value >> 16) & 0xff)
    out.write((value >> 8) & 0xff)
    out.write(value & 0xff)
}

void writeAscii(OutputStream out, String value) {
    out.write(value.getBytes(java.nio.charset.StandardCharsets.US_ASCII))
}

void writeIcns(File file, List<Map> entries) {
    def chunks = entries.collect { [type: it.type as String, data: pngBytes(it.image as java.awt.image.BufferedImage)] }
    int totalLength = 8 + chunks.sum { 8 + it.data.length }
    file.withOutputStream { out ->
        writeAscii(out, 'icns')
        writeIntBE(out, totalLength)
        chunks.each { chunk ->
            writeAscii(out, chunk.type)
            writeIntBE(out, 8 + chunk.data.length)
            out.write(chunk.data)
        }
    }
}

// ──────────────────────────────────────────────────────────────
// 독립 실행 fat JAR (gradle fatJar 로 빌드)
tasks.register('fatJar', Jar) {
    group = 'build'
    description = 'Builds a standalone fat JAR (for direct java -jar execution)'
    archiveClassifier.set('all')
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes 'Main-Class': 'org.kyj.llmmanager.LlmManagerApp'
    }
    from sourceSets.main.output
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
}
